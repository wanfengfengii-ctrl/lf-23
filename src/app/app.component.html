<mat-toolbar color="primary" class="app-toolbar">
  <span class="title">{{ title }}</span>
  <div *ngIf="currentDispatcher" class="current-user" [style.border-color]="getRoleColor()">
    <div
      class="user-avatar"
      [style.background]="getRoleColor()"
    >{{ currentDispatcher.realName.charAt(0) }}</div>
    <div class="user-info">
      <div class="user-name">{{ currentDispatcher.realName }}</div>
      <div class="user-role" [style.color]="getRoleColor()">{{ getRoleLabel() }}</div>
    </div>
  </div>
  <span class="spacer"></span>
  <button mat-button (click)="togglePanel('fault')"
    [class.active-btn]="showFaultPanel">
    <mat-icon
      matBadge="{{ activeFaultCount }}"
      matBadgeColor="warn"
      [matBadgeHidden]="activeFaultCount === 0"
    >warning</mat-icon>
    故障处置
  </button>
  <button mat-button (click)="togglePanel('user')"
    [class.active-btn]="showUserPanel">
    <mat-icon>people</mat-icon>
    用户
  </button>
  <button mat-button (click)="togglePanel('approval')"
    [class.active-btn]="showApprovalPanel">
    <mat-icon
      matBadge="{{ pendingApprovalCount }}"
      matBadgeColor="accent"
      [matBadgeHidden]="pendingApprovalCount === 0"
    >how_to_reg</mat-icon>
    审批中心
  </button>
  <button mat-button (click)="togglePanel('handover')"
    [class.active-btn]="showHandoverPanel">
    <mat-icon>swap_horiz</mat-icon>
    交接班
  </button>
  <button mat-button (click)="togglePanel('audit')"
    [class.active-btn]="showAuditPanel"
    *ngIf="canViewAudit"
    matTooltip="仅总调度员可查看">
    <mat-icon>description</mat-icon>
    审计日志
  </button>
  <button mat-button (click)="togglePanel('dispatcher')"
    [class.active-btn]="showDispatcherPanel">
    <mat-icon>{{ showDispatcherPanel ? 'chevron_right' : 'chevron_left' }}</mat-icon>
    调度台
  </button>
  <button mat-button (click)="togglePanel('config')"
    [class.active-btn]="showConfigPanel">
    <mat-icon>settings</mat-icon>
    配置
  </button>
</mat-toolbar>

<div class="app-container">
  <div class="main-area">
    <div class="map-section">
      <app-railway-map></app-railway-map>
    </div>
    <div class="timeline-section">
      <app-timeline></app-timeline>
    </div>
    <div class="control-section">
      <app-control-panel></app-control-panel>
    </div>
  </div>

  <div class="side-panels">
    <div class="panel-wrapper" *ngIf="showUserPanel">
      <app-user-panel></app-user-panel>
    </div>
    <div class="panel-wrapper" *ngIf="showApprovalPanel">
      <app-approval-panel></app-approval-panel>
    </div>
    <div class="panel-wrapper" *ngIf="showHandoverPanel">
      <app-shift-handover-panel></app-shift-handover-panel>
    </div>
    <div class="panel-wrapper" *ngIf="showAuditPanel && canViewAudit">
      <app-audit-log-panel></app-audit-log-panel>
    </div>
    <div class="panel-wrapper" *ngIf="showFaultPanel">
      <app-fault-panel></app-fault-panel>
    </div>
    <div class="panel-wrapper" *ngIf="showDispatcherPanel">
      <app-dispatcher-panel></app-dispatcher-panel>
    </div>
    <div class="panel-wrapper" *ngIf="showConfigPanel">
      <app-config-panel></app-config-panel>
    </div>
  </div>
</div>
